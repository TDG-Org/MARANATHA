<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="MARANATHA — a biblically accurate story game with real depth. Walk through the events of the Bible." />
  <title>MARANATHA</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; background: #0a0a12; overflow: hidden;
      /* D8: a GAME, not a document — nothing highlights on tap/drag, no long-press
         callout, no tap flash. (Range sliders and buttons still work fine.) */
      user-select: none; -webkit-user-select: none; -ms-user-select: none;
      -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* UI lives in the DOM, layered over the canvas — text is rendered by the
       browser at native resolution, so it is ALWAYS crisp on any screen.
       Screens (home, stories) build their own DOM; these two are persistent. */
    #debug {
      /* D8: lifted clear of the About/Support links (bottom-left, home screen) */
      position: fixed; left: calc(8px + env(safe-area-inset-left)); bottom: calc(58px + env(safe-area-inset-bottom));
      display: none; pointer-events: none;
      z-index: 30; font: 11px/1.5 ui-monospace, Consolas, monospace; color: #cfe8cf;
      background: rgba(10, 10, 18, 0.65); padding: 6px 9px; border-radius: 6px;
      white-space: pre;
    }

    /* D8 phone pass: the dialogue + verse boxes shrink to compact sizes on
       small screens (inline styles set the desktop look; these win on phones). */
    @media (max-width: 560px), (max-height: 500px) {
      .mr-dialogue { width: min(94vw, 480px) !important; padding: 9px 12px 7px !important; border-radius: 11px !important; bottom: calc(12px + env(safe-area-inset-bottom)) !important; }
      .mr-dialogue .mr-dlg-name { font-size: 13px !important; margin-bottom: 3px !important; }
      .mr-dialogue .mr-dlg-text { font-size: 13.5px !important; line-height: 1.42 !important; min-height: 2.1em !important; }
      .mr-dialogue .mr-dlg-footer { margin-top: 4px !important; min-height: 18px !important; }
      .mr-versecard { width: min(92vw, 460px) !important; padding: 8px 12px !important; }
      .mr-versecard .mr-verse-text { font-size: 13px !important; line-height: 1.45 !important; }
      .mr-versecard .mr-verse-ref { font-size: 9.5px !important; margin-top: 4px !important; }
    }
    #volume {
      position: fixed; top: calc(12px + env(safe-area-inset-top)); right: calc(14px + env(safe-area-inset-right)); z-index: 30;
      display: flex; align-items: center; gap: 8px; opacity: 0.7; transition: opacity 0.25s;
    }
    #volume:hover { opacity: 1; }
    #volume button {
      background: none; border: none; font-size: 17px; cursor: pointer;
      padding: 8px; line-height: 1; filter: drop-shadow(0 1px 3px rgba(15, 12, 26, 0.6));
    }
    #volume input[type="range"] {
      width: 86px; height: 26px; accent-color: #f2b880; cursor: pointer; background: transparent;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="volume"></div>
  <div id="debug"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
