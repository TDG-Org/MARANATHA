<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="MARANATHA — a biblically accurate story game with real depth. Walk through the events of the Bible." />
  <title>MARANATHA</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a12; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* UI lives in the DOM, layered over the canvas — text is rendered by the
       browser at native resolution, so it is ALWAYS crisp on any screen. */
    #ui {
      position: fixed; inset: 0; pointer-events: none;
      font-family: Georgia, 'Times New Roman', serif; color: #fdf6e3;
      -webkit-user-select: none; user-select: none;
    }
    #ui .title {
      position: absolute; top: 4vh; left: 0; right: 0; text-align: center;
      font-size: clamp(22px, 4vw, 34px); letter-spacing: 0.45em; text-indent: 0.45em;
      opacity: 0.92; text-shadow: 0 1px 6px rgba(15, 12, 26, 0.55);
    }
    #ui .subtitle {
      position: absolute; top: calc(4vh + clamp(34px, 5.4vw, 48px)); left: 0; right: 0;
      text-align: center; font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(11px, 1.5vw, 13px); letter-spacing: 0.18em; text-indent: 0.18em;
      opacity: 0.6; text-shadow: 0 1px 4px rgba(15, 12, 26, 0.6);
    }
    #debug {
      position: fixed; left: 8px; bottom: 8px; display: none; pointer-events: none;
      font: 11px/1.5 ui-monospace, Consolas, monospace; color: #cfe8cf;
      background: rgba(10, 10, 18, 0.65); padding: 6px 9px; border-radius: 6px;
      white-space: pre;
    }
    #volume {
      position: fixed; top: 12px; right: 14px; display: flex; align-items: center; gap: 8px;
      opacity: 0.7; transition: opacity 0.25s;
    }
    #volume:hover { opacity: 1; }
    #volume button {
      background: none; border: none; font-size: 17px; cursor: pointer;
      padding: 8px; line-height: 1; filter: drop-shadow(0 1px 3px rgba(15, 12, 26, 0.6));
    }
    #volume input[type="range"] {
      width: 86px; height: 26px; accent-color: #f2b880; cursor: pointer; background: transparent;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <div class="title">MARANATHA</div>
    <div class="subtitle">HD-2D FOUNDATION — GOLDEN HOUR</div>
  </div>
  <div id="volume"></div>
  <div id="debug"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
